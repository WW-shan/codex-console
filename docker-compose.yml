version: '3.8'

services:
  webui:
    build: .
    ports:
      - "${WEBUI_PORT:-8000}:${WEBUI_PORT:-8000}"
    environment:
      - WEBUI_HOST=${WEBUI_HOST:-0.0.0.0}
      - WEBUI_PORT=${WEBUI_PORT:-8000}
      - DEBUG=${DEBUG:-0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WEBUI_ACCESS_PASSWORD=${WEBUI_ACCESS_PASSWORD:-admin123}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
