version: '3.8'

services:
  webui:
    image: ghcr.io/ww-shan/codex-console:latest
    shm_size: "1gb"
    ports:
      - "6080:6080"
      # 如需使用 VNC 客户端直连可打开：
      # - "5900:5900"
    environment:
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=1455
      - DISPLAY=:99
      - ENABLE_VNC=1
      - VNC_PORT=5900
      - NOVNC_PORT=6080
      - DEBUG=0
      - LOG_LEVEL=info
      # 如果需要访问密码，可以在这里取消注释并设置
      - WEBUI_ACCESS_PASSWORD=11111111
    volumes:
      # 挂载数据目录以持久化数据库和日志
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - npm_network
    restart: unless-stopped

networks:
  npm_network:
    external: true
